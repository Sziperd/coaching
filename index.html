<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eeeae6" />

  <title>Relevateme — coaching i mentoring biznesowo-życiowy</title>
  <meta
    name="description"
    content="Coaching i mentoring biznesowo-życiowy dla osób, które chcą rozwijać firmę bez tracenia życia. Praca 1:1, konkretna mapa i decyzje dopasowane do Twojej sytuacji."
  />

  <link rel="preload" href="styles.css?v=brand-modals-v1" as="style" />
  <link rel="stylesheet" href="styles.css?v=brand-modals-v1" />
</head>

<body>
  <div class="ambient" aria-hidden="true">
    <div class="ambient__shape ambient__shape--one"></div>
    <div class="ambient__shape ambient__shape--two"></div>
    <div class="ambient__grid"></div>
  </div>

  <header class="siteHeader" id="siteHeader">
    <div class="container nav__inner">
      <a class="brand" href="#home" aria-label="">
        <img class="brand__logo" src="pictures/relevateme-icon.png" alt="" />
      </a>

      <nav class="nav__links" aria-label="">
        <a href="#o-mnie"></a>
        <a href="#pakiety"></a>
        <a href="#formula"></a>
        <a href="#eksperci"></a>
        <a href="#pakiety" data-open-quiz></a>
        <a href="#wspolpraca" data-open-modal="cooperation"></a>
      </nav>

      <div class="nav__actions">
        <a class="btn btn--outline nav__cta" href="#kontakt"></a>

        <button class="nav__toggle" id="navToggle" type="button" aria-label="" aria-expanded="false">
          <span></span>
          <span class="nav__toggleMid"></span>
          <span></span>
        </button>
      </div>
    </div>

    <div class="drawer" id="drawer" aria-hidden="true">
      <button class="drawer__backdrop" id="drawerBackdrop" type="button" aria-label=""></button>

      <div class="drawer__panel">
        <a href="#o-mnie" class="drawer__link"></a>
        <a href="#pakiety" class="drawer__link"></a>
        <a href="#formula" class="drawer__link"></a>
        <a href="#eksperci" class="drawer__link"></a>
        <a href="#pakiety" class="drawer__link" data-open-quiz></a>
        <a href="#wspolpraca" class="drawer__link" data-open-modal="cooperation"></a>
        <a href="#kontakt" class="btn btn--primary btn--wide"></a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="container hero__inner">
        <div class="hero__copy">
          <img class="heroLogo reveal" src="pictures/relevateme-logotype-cropped.png" alt="" />
          <p class="eyebrow reveal"></p>

          <h1 class="hero__title reveal"></h1>

          <p class="hero__lead reveal"></p>

          <div class="hero__actions reveal">
            <a class="btn btn--primary" href="#kontakt" data-magnetic>
              <span class="btn__shine" aria-hidden="true"></span>
            </a>

            <a class="btn btn--text" href="#formula"></a>
          </div>
        </div>

        <div class="hero__aside reveal">
          <button class="quoteCard" type="button" data-goal-card data-tilt aria-label="">
            <span class="quoteCard__layer quoteCard__layer--back" aria-hidden="true"></span>
            <span class="quoteCard__layer quoteCard__layer--middle" aria-hidden="true"></span>
            <span class="quoteCard__nextFace" aria-hidden="true" data-next-goal-face>
              <span class="quoteCard__label" data-next-goal-label></span>
              <span class="quoteCard__text" data-next-goal-text></span>
            </span>
            <span class="quoteCard__face" data-goal-face>
              <span class="quoteCard__label" data-goal-label></span>
              <span class="quoteCard__text" data-goal-text aria-live="polite"></span>
            </span>
          </button>
        </div>
      </div>
    </section>

    <section class="section section--white" id="o-mnie">
      <div class="container split split--challenge">
        <div class="blobImage reveal" data-tilt>
          <img
            src="https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=900&q=80"
            alt=""
            loading="lazy"
          />
        </div>

        <div class="section__copy reveal">
          <p class="eyebrow"></p>

          <h2></h2>

          <ul class="checkList"></ul>

          <div class="challengeNote">
            <span></span>
            <strong></strong>
          </div>
        </div>
      </div>
    </section>

    <section class="section section--sand" id="sygnaly">
      <div class="container signals">
        <div class="signals__intro reveal">
          <p class="eyebrow"></p>
          <h2></h2>
        </div>

        <div class="signals__panel reveal">
          <ol class="signalsList" data-signals-list></ol>

          <p class="signalsKicker"></p>
        </div>
      </div>
    </section>

    <section class="section section--sand" id="coaching">
      <div class="container split split--method">
        <div class="section__copy reveal">
          <p class="eyebrow"></p>

          <h2></h2>

          <p></p>

          <p></p>
        </div>

        <div class="blobImage blobImage--right reveal" data-tilt>
          <img
            src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=900&q=80"
            alt=""
            loading="lazy"
          />
        </div>
      </div>
    </section>

    <section class="section section--white" id="oferta">
      <div class="container">
        <div class="sectionHead reveal">
          <p class="eyebrow"></p>
          <h2></h2>
          <p></p>
        </div>

        <div class="offerGrid">
          <article class="offerCard reveal" data-tilt>
            <span class="offerCard__number"></span>
            <h3></h3>
            <p></p>
          </article>

          <article class="offerCard reveal" data-tilt>
            <span class="offerCard__number"></span>
            <h3></h3>
            <p></p>
          </article>

          <article class="offerCard reveal" data-tilt>
            <span class="offerCard__number"></span>
            <h3></h3>
            <p></p>
          </article>
        </div>
      </div>
    </section>

    <section class="section section--white" id="historie">
      <div class="container stories">
        <div class="sectionHead reveal">
          <p class="eyebrow"></p>
          <h2></h2>
          <p></p>
        </div>

        <div class="storiesGrid" data-stories-grid></div>

        <div class="storiesCta reveal">
          <p><strong></strong></p>
          <a class="btn btn--primary" href="#kontakt" data-magnetic>
            <span class="btn__shine" aria-hidden="true"></span>
          </a>
        </div>
      </div>
    </section>

    <section class="section section--sand" id="pakiety">
      <div class="container packages">
        <div class="sectionHead reveal">
          <p class="eyebrow"></p>
          <h2></h2>
          <p></p>
        </div>

        <div class="packagesGrid" data-packages-grid></div>

        <div class="packagesCta reveal">
          <article class="packagesCta__item">
            <p><strong></strong></p>
            <a class="btn btn--primary" href="#kontakt" data-magnetic>
              <span class="btn__shine" aria-hidden="true"></span>
            </a>
          </article>

          <article class="packagesCta__item packagesCta__item--quiz">
            <p><strong></strong></p>
            <button class="btn btn--secondary" type="button" data-open-quiz></button>
          </article>
        </div>
      </div>
    </section>

    <section class="section formulaSection" id="formula">
      <div class="container formula reveal">
        <img
          class="formula__image"
          src="pictures/f1-cockpit-section.png"
          alt=""
          loading="lazy"
        />

        <div class="formula__copy">
          <p class="eyebrow eyebrow--light"></p>
          <h2></h2>
          <p class="formula__lead"></p>
          <p class="formula__text"></p>
          <strong class="formula__punchline"></strong>

          <div class="formulaRadioCard">
            <span></span>
            <ul data-formula-points></ul>
          </div>
        </div>
      </div>
    </section>

    <section class="section section--navy processSection" data-process-section>
      <div class="container process">
        <div class="sectionHead reveal">
          <p class="eyebrow eyebrow--light"></p>
          <h2></h2>
        </div>

        <div class="processGrid">
          <article class="processStep" data-process-step>
            <span></span>
            <h3></h3>
            <p></p>
          </article>

          <article class="processStep" data-process-step>
            <span></span>
            <h3></h3>
            <p></p>
          </article>

          <article class="processStep" data-process-step>
            <span></span>
            <h3></h3>
            <p></p>
          </article>
        </div>
      </div>
    </section>

    <section class="section section--white" id="eksperci">
      <div class="container experts">
        <div class="sectionHead reveal">
          <p class="eyebrow"></p>
          <h2></h2>
        </div>

        <div class="expertsCarousel reveal" aria-label="">
          <div class="expertsTrack" data-experts-track></div>
          <div class="expertsDots" data-experts-dots aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <section class="section section--sand" id="kontakt">
      <div class="container contact">
        <div class="contact__copy reveal">
          <p class="eyebrow"></p>
          <h2></h2>
          <p></p>

          <div class="contactCards">
            <a class="contactCard" href="#">
              <span></span>
              <strong></strong>
            </a>

            <a class="contactCard" href="#">
              <span></span>
              <strong></strong>
            </a>

            <a class="contactCard contactCard--linkedin" href="#" target="_blank" rel="noopener noreferrer">
              <span></span>
              <svg class="contactCard__icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                <path fill="currentColor" d="M20.45 20.45h-3.56v-5.58c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.67H9.34V8.99h3.42v1.57h.05c.48-.9 1.64-1.85 3.37-1.85 3.61 0 4.27 2.37 4.27 5.46v6.28ZM5.32 7.42a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM7.1 20.45H3.54V8.99H7.1v11.46Z"/>
              </svg>
              <strong></strong>
            </a>
          </div>

          <div class="contact__actions">
            <button class="btn btn--secondary" type="button" data-open-modal="faq"></button>
          </div>
        </div>

        <form class="contactForm reveal" id="contactForm" data-email="">
          <label>
            <input type="text" name="name" placeholder="" required />
          </label>

          <label>
            <input type="email" name="email" placeholder="" required />
          </label>

          <label>
            <textarea name="message" rows="5" placeholder="" required></textarea>
          </label>

          <label class="contactConsent">
            <input type="checkbox" name="privacyConsent" required />
            <span></span>
          </label>

          <button class="btn btn--primary btn--wide" type="submit" data-contact-submit data-magnetic disabled>
            <span class="btn__shine" aria-hidden="true"></span>
          </button>

          <p class="formStatus" id="formStatus" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p>© <span id="year"></span></p>
      <div class="footer__links">
        <button type="button" data-open-modal="faq"></button>
        <button type="button" data-open-modal="privacy"></button>
        <a href="#home"></a>
      </div>
    </div>
  </footer>

  <div class="siteModal" data-site-modal aria-hidden="true">
    <button class="siteModal__backdrop" type="button" data-modal-close aria-label=""></button>
    <section class="siteModal__panel" role="dialog" aria-modal="true" aria-labelledby="siteModalTitle">
      <button class="siteModal__close" type="button" data-modal-close aria-label="">×</button>
      <div class="siteModal__content" data-modal-content></div>
    </section>
  </div>

  <div class="quizWidget" data-quiz-widget>
    <button class="quizFab" type="button" data-quiz-toggle aria-expanded="false" aria-controls="quizPanel">
      <span class="quizFab__text"></span>
    </button>

    <section class="quizPanel" id="quizPanel" data-quiz-panel aria-hidden="true" aria-label="">
      <header class="quizPanel__header">
        <div>
          <span data-quiz-eyebrow></span>
          <strong data-quiz-title></strong>
        </div>
        <button class="quizPanel__close" type="button" data-quiz-close aria-label="">×</button>
      </header>

      <div class="quizPanel__body" data-quiz-messages aria-live="polite"></div>

      <footer class="quizPanel__footer" data-quiz-footer></footer>
    </section>
  </div>

  <script src="content.js?v=brand-modals-v1"></script>
  <script src="script.js?v=brand-modals-v1"></script>
</body>
</html>
